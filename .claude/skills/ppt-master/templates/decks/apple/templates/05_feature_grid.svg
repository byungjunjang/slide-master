          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="52" letter-spacing="-1.2"
          fill="#1d1d1f">{{TITLE}}</text>
  </g>

  <g id="feature-1">
    <g id="feature-1-icon" transform="translate(267 315) scale(1.0833)"
