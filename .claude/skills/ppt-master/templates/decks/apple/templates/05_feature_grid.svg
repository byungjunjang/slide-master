      <circle cx="12" cy="12" r="9"/>
      <path d="M12 3a9 9 0 0 0 0 18z" fill="#1d1d1f" stroke="none"/>
    </g>
    <text x="280" y="394" text-anchor="middle"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="26" letter-spacing="-0.5"
          fill="#1d1d1f">{{FEAT_1_TITLE}}</text>
    <text x="280" y="435" text-anchor="middle"
          font-family="Pretendard, 'Malgun Gothic', sans-serif"
          font-size="17" letter-spacing="-0.2"
          fill="#6e6e73">{{FEAT_1_BODY}}</text>
  </g>

  <g id="feature-2">
    <g id="feature-2-icon" transform="translate(627 315) scale(1.0833)"
       fill="none" stroke="#1d1d1f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 14h18"/>
    </g>
    <text x="640" y="394" text-anchor="middle"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="26" letter-spacing="-0.5"
          fill="#1d1d1f">{{FEAT_2_TITLE}}</text>
    <text x="640" y="435" text-anchor="middle"
          font-family="Pretendard, 'Malgun Gothic', sans-serif"
          font-size="17" letter-spacing="-0.2"
          fill="#6e6e73">{{FEAT_2_BODY}}</text>
  </g>

  <g id="feature-3">
    <g id="feature-3-icon" transform="translate(987 315) scale(1.0833)"
       fill="none" stroke="#1d1d1f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 16l5-5 4 4 7-7"/>
      <path d="M4 20h16"/>
    </g>
    <text x="1000" y="394" text-anchor="middle"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
