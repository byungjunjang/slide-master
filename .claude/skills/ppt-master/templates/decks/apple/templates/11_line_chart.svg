<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-pptx-master="apple-master" data-pptx-master-name="Apple" data-pptx-layout="chart_linear" data-pptx-layout-name="Chart (Linear)">
  <!-- Apple (Vitrine monochrome) — 11 Line Chart — sample data; replaced with real-data charts at deck generation -->

  <rect id="master-bg" width="1280" height="720" fill="#FFFFFF" data-pptx-layer="master" data-pptx-editable="false"/>

  <g id="chart-kicker">
    <text x="120" y="94"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="14" letter-spacing="0.84"
          fill="#6e6e73">{{KICKER}}</text>
  </g>

  <g id="title-slot" data-pptx-placeholder="title" data-pptx-placeholder-bounds="120 106 700 48">
    <text id="title-carrier" data-pptx-placeholder-carrier="true" x="120" y="145"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="44" letter-spacing="-1"
          fill="#1d1d1f">{{TITLE}}</text>
  </g>

  <g id="chart-legend">
    <line x1="893" y1="145" x2="919" y2="145" stroke="#1d1d1f" stroke-width="3"/>
    <text x="929" y="150"
          font-family="Pretendard, 'Malgun Gothic', sans-serif"
          font-size="15" letter-spacing="-0.2"
          fill="#6e6e73">{{LEGEND_SERIES_A}}</text>
    <line x1="1030" y1="145" x2="1056" y2="145" stroke="#6e6e73" stroke-width="3" stroke-dasharray="7 6"/>
    <text x="1066" y="150"
          font-family="Pretendard, 'Malgun Gothic', sans-serif"
          font-size="15" letter-spacing="-0.2"
          fill="#6e6e73">{{LEGEND_SERIES_B}}</text>
  </g>

  <!-- chart-plot-area: 180,270,1160,550 -->
  <g id="chart-body">
    <g id="chart-grid" stroke="#e0e0e0" stroke-width="1">
      <line x1="180" y1="270" x2="1160" y2="270"/>
      <line x1="180" y1="340" x2="1160" y2="340"/>
      <line x1="180" y1="410" x2="1160" y2="410"/>
      <line x1="180" y1="480" x2="1160" y2="480"/>
      <line x1="180" y1="550" x2="1160" y2="550"/>
    </g>

    <g id="chart-y-axis" text-anchor="end"
       font-family="Pretendard, 'Malgun Gothic', sans-serif"
       font-size="13" letter-spacing="-0.1" fill="#6e6e73">
      <text x="166" y="274">100</text>
      <text x="166" y="344">75</text>
      <text x="166" y="414">50</text>
      <text x="166" y="484">25</text>
      <text x="166" y="554">0</text>
    </g>

    <g id="chart-x-axis" text-anchor="middle"
       font-family="Pretendard, 'Malgun Gothic', sans-serif"
       font-size="13" letter-spacing="-0.1" fill="#6e6e73">
      <text x="302" y="580">Q1</text>
      <text x="547" y="580">Q2</text>
      <text x="792" y="580">Q3</text>
      <text x="1037" y="580">Q4</text>
    </g>

    <polyline id="chart-series-b" fill="none" stroke="#6e6e73" stroke-width="3"
              stroke-dasharray="7 6" stroke-linecap="round" stroke-linejoin="round"
              points="302,500 547,460 792,455 1037,400"/>
    <polyline id="chart-series-a" fill="none" stroke="#1d1d1f" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round"
              points="302,480 547,410 792,370 1037,302"/>

    <g id="chart-points" fill="#1d1d1f">
      <circle cx="302" cy="480" r="5"/>
      <circle cx="547" cy="410" r="5"/>
      <circle cx="792" cy="370" r="5"/>
      <circle cx="1037" cy="302" r="5"/>
    </g>
  </g>

  <g id="page-foot">
    <text x="64" y="682"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12" letter-spacing="-0.4"
          fill="#6e6e73">{{BRAND_MARK}}</text>
    <text x="1216" y="682" text-anchor="end"
          font-family="Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12" letter-spacing="-0.12"
          fill="#7a7a7a">{{PAGE_LABEL}}</text>
  </g>
</svg>
