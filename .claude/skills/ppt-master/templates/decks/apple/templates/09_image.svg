<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-pptx-master="apple-master" data-pptx-master-name="Apple" data-pptx-layout="09_image" data-pptx-layout-name="Image">
  <!-- Apple (Vitrine monochrome) — 09 Image — the ONLY page carrying the system shadow -->

  <defs>
    <pattern id="imgph-hatch" patternUnits="userSpaceOnUse" width="20" height="20"
             patternTransform="rotate(45)" data-pptx-pattern="ltUpDiag">
      <rect width="20" height="20" fill="#f5f5f7"/>
      <rect width="10" height="20" fill="#ececef"/>
    </pattern>
    <filter id="shadow-product" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="3" dy="5" stdDeviation="15" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect id="master-bg" width="1280" height="720" fill="#FFFFFF" data-pptx-layer="master" data-pptx-editable="false"/>

  <g id="image-kicker">
    <text x="640" y="102" text-anchor="middle"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="14" letter-spacing="0.84"
          fill="#6e6e73">{{KICKER}}</text>
  </g>

  <g id="title-slot" data-pptx-placeholder="title" data-pptx-placeholder-bounds="210 120 860 56">
    <text id="title-carrier" data-pptx-placeholder-carrier="true" x="640" y="164" text-anchor="middle"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="52" letter-spacing="-1.2"
          fill="#1d1d1f">{{TITLE}}</text>
  </g>

  <g id="image-frame">
    <rect x="120" y="270" width="1040" height="362" rx="12" fill="url(#imgph-hatch)" filter="url(#shadow-product)"/>
    <text x="640" y="455" text-anchor="middle"
          font-family="Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12" letter-spacing="-0.08"
          fill="#a8a8ad">Drop product photograph here · rests on the canvas</text>
  </g>

  <g id="page-foot">
    <text x="64" y="682"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12" letter-spacing="-0.4"
          fill="#6e6e73">{{BRAND_MARK}}</text>
    <text x="1216" y="682" text-anchor="end"
          font-family="Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12" letter-spacing="-0.12"
          fill="#7a7a7a">{{PAGE_LABEL}}</text>
  </g>
</svg>
