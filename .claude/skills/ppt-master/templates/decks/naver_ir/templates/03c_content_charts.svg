<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-pptx-master="naver-ir-master" data-pptx-master-name="Naver IR" data-pptx-layout="03c_content_charts" data-pptx-layout-name="Content Chart Grid">
  <!-- Naver IR — 03c Content · Chart Grid (사업부문별 손익형: 2-3 chart panels side by side + unit note) -->

  <rect id="master-bg" width="1280" height="720" fill="#FFFFFF" data-pptx-layer="master" data-pptx-editable="false"/>

  <image id="layout-watermark" href="../images/naver-wordmark-gray.png" x="1130" y="40" width="86" height="18" data-pptx-layer="layout" data-pptx-editable="false"/>

  <g id="title-slot" data-pptx-placeholder="title" data-pptx-placeholder-bounds="64 44 560 40">
    <text id="title-carrier" data-pptx-placeholder-carrier="true" x="64" y="74"
          font-family="'Pretendard ExtraBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="30"
          letter-spacing="-0.6"
          fill="#000000">{{PAGE_TITLE}}</text>
  </g>

  <g id="unit-note-slot" data-pptx-placeholder="body" data-pptx-placeholder-bounds="640 52 300 24">
    <text id="unit-note-carrier" data-pptx-placeholder-carrier="true" x="640" y="71"
          font-family="Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12"
          fill="#7F7F7F">{{UNIT_NOTE}}</text>
  </g>

  <!-- CONTENT AREA (Executor fills freely) -->
  <!-- x=64, y=120, w=1152, h=540 — 2-3 chart panels in a row (each ≈348-548px wide, 56px gaps);
       panel sub-header 16px/700 black above each chart; quarterly bars with pale-tint history,
       margin/% line riding above bars, per-point labels, no gridlines, no y-axis, no legend chrome -->
</svg>
