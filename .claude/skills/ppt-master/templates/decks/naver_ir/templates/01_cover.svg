<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-pptx-master="naver-ir-master" data-pptx-master-name="Naver IR" data-pptx-layout="01_cover" data-pptx-layout-name="Cover">
  <!-- Naver IR — 01 Cover (full-bleed light green, white wordmark, centered title/date) -->

  <rect id="master-bg" width="1280" height="720" fill="#FFFFFF" data-pptx-layer="master" data-pptx-editable="false"/>

  <rect id="layout-cover-bg" width="1280" height="720" fill="#5BDB7D" data-pptx-layer="layout" data-pptx-editable="false"/>
  <image id="layout-wordmark" href="../images/naver-wordmark-white.png" x="72" y="56" width="150" height="31.5" data-pptx-layer="layout" data-pptx-editable="false"/>

  <g id="title-slot" data-pptx-placeholder="title" data-pptx-placeholder-bounds="140 312 1000 52">
    <text id="title-carrier" data-pptx-placeholder-carrier="true" x="640" y="352"
          font-family="'Pretendard ExtraBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="40"
          letter-spacing="-0.8"
          text-anchor="middle"
          fill="#FFFFFF">{{TITLE}}</text>
  </g>

  <g id="date-slot" data-pptx-placeholder="subtitle" data-pptx-placeholder-idx="2" data-pptx-placeholder-bounds="340 384 600 28">
    <text id="date-carrier" data-pptx-placeholder-carrier="true" x="640" y="406"
          font-family="'Pretendard Medium', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="18"
          text-anchor="middle"
          fill="#FFFFFF">{{DATE}}</text>
  </g>
</svg>
