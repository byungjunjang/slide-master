  <line id="layout-footer-hairline" x1="44" y1="664" x2="1236" y2="664" stroke="#D0D0D0" stroke-width="1" data-pptx-layer="layout" data-pptx-editable="false"/>

  <g id="title-slot" data-pptx-placeholder="title" data-pptx-placeholder-bounds="44 284 1192 60">
