<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-pptx-master="jangpm-master" data-pptx-master-name="Jangpm" data-pptx-layout="02_chapter" data-pptx-layout-name="Chapter">
  <!-- Jangpm — 02 Chapter / Section Divider -->

  <rect id="master-bg" width="1280" height="720" fill="#FAFAF9" data-pptx-layer="master" data-pptx-editable="false"/>

  <line id="layout-bottom-divider" x1="56" y1="672" x2="1224" y2="672" stroke="#E5E7EB" stroke-width="1" data-pptx-layer="layout" data-pptx-editable="false"/>

  <g id="title-slot" data-pptx-placeholder="title" data-pptx-placeholder-bounds="56 344 1168 68">
    <text id="title-carrier" data-pptx-placeholder-carrier="true" x="56" y="400"
          font-family="'Pretendard ExtraBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="56"
          letter-spacing="-1.68"
          fill="#1A1A1A">{{CHAPTER_TITLE}}</text>
  </g>

  <g id="page-number-slot" data-pptx-placeholder="slide-number" data-pptx-placeholder-idx="3" data-pptx-placeholder-bounds="1100 682 124 20">
    <text id="page-number-carrier" data-pptx-placeholder-carrier="true" x="1224" y="696"
          font-family="'Pretendard Medium', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12.8"
          text-anchor="end"
          fill="#9CA3AF">{{PAGE_NUM}}</text>
  </g>

  <g id="chapter-number">
    <text x="56" y="260"
          font-family="'Pretendard ExtraBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="40"
          letter-spacing="-0.8"
          fill="#4633E3">{{CHAPTER_NUMBER}}</text>
  </g>

  <g id="chapter-label">
    <text x="56" y="300"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12.8"
          letter-spacing="0.64"
          fill="#6B7280">{{CHAPTER_LABEL}}</text>
  </g>

  <g id="chapter-summary">
    <text x="56" y="450"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="18.4"
          fill="#6B7280">{{CHAPTER_SUMMARY}}</text>
  </g>
</svg>
