<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-pptx-master="jangpm-master" data-pptx-master-name="Jangpm" data-pptx-layout="04_ending" data-pptx-layout-name="Ending">
  <!-- Jangpm — 04 Ending -->

  <rect id="master-bg" width="1280" height="720" fill="#FAFAF9" data-pptx-layer="master" data-pptx-editable="false"/>

  <rect id="layout-accent-rule" x="56" y="140" width="80" height="3" fill="#4633E3" data-pptx-layer="layout" data-pptx-editable="false"/>
  <line id="layout-bottom-divider" x1="56" y1="672" x2="1224" y2="672" stroke="#E5E7EB" stroke-width="1" data-pptx-layer="layout" data-pptx-editable="false"/>

  <g id="title-slot" data-pptx-placeholder="title" data-pptx-placeholder-bounds="56 284 1168 68">
    <text id="title-carrier" data-pptx-placeholder-carrier="true" x="56" y="340"
          font-family="'Pretendard ExtraBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="56"
          letter-spacing="-1.68"
          fill="#1A1A1A">{{CLOSING_HEADLINE}}</text>
  </g>

  <g id="closing-eyebrow">
    <text x="56" y="180"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12.8"
          letter-spacing="0.64"
          fill="#6B7280">{{CLOSING_LABEL}}</text>
  </g>

  <g id="closing-accent">
    <text x="56" y="410"
          font-family="'Pretendard ExtraBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="40"
          letter-spacing="-0.8"
          fill="#4633E3">{{CLOSING_ACCENT}}</text>
  </g>

  <g id="closing-contact">
    <text x="56" y="470"
          font-family="'Pretendard SemiBold', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="18.4"
          fill="#1A1A1A">{{CONTACT_LINE}}</text>
  </g>

  <g id="closing-footer">
    <text x="56" y="696"
          font-family="'Pretendard Medium', Pretendard, 'Malgun Gothic', sans-serif"
          font-size="12.8"
          fill="#9CA3AF">{{PRESENTER}} · {{DATE}}</text>
  </g>
</svg>
