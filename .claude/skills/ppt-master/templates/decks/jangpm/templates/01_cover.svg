<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" data-pptx-master="jangpm-master" data-pptx-master-name="Jangpm" data-pptx-layout="01_cover" data-pptx-layout-name="Cover">
