<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-master="academic_defense-master" data-pptx-master-name="Academic Defense" data-pptx-layout="01_cover" data-pptx-layout-name="Cover">
  <!-- 背景 -->
  <rect id="master-bg" width="1280" height="720" fill="#FFFFFF" data-pptx-layer="master" data-pptx-editable="false"/>

  <!-- ==================== 顶部装饰区域 ==================== -->
  <!-- 深蓝色主横条 -->
  <rect id="layout-01_cover-header" x="0" y="0" width="1280" height="100" fill="#003366" data-pptx-layer="layout" data-pptx-editable="false"/>
  <!-- 左侧红色竖条装饰 -->
  <rect id="layout-01_cover-headbar" x="0" y="0" width="6" height="100" fill="#CC0000" data-pptx-layer="layout" data-pptx-editable="false"/>
  <!-- 底部信息条 -->
  <rect id="layout-01_cover-footer" x="0" y="665" width="1280" height="55" fill="#F5F7FA" data-pptx-layer="layout" data-pptx-editable="false"/>

  <!-- ==================== 主内容区域 ==================== -->
  <!-- 主标题 -->
  <g id="title-slot" data-pptx-placeholder="title" data-pptx-placeholder-bounds="140 288 1000 68">
    <text x="640" y="340" text-anchor="middle" fill="#003366" font-family="Microsoft YaHei, Arial, sans-serif" font-size="56" font-weight="bold" id="slot-01_cover-title-1" data-pptx-placeholder-carrier="true">
      {{TITLE}}
    </text>
  </g>

  <!-- 副标题 -->
  <g id="subtitle-slot" data-pptx-placeholder="subtitle" data-pptx-placeholder-idx="2" data-pptx-placeholder-bounds="140 382 1000 40">
    <text x="640" y="410" text-anchor="middle" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" id="slot-01_cover-subtitle-2" data-pptx-placeholder-carrier="true">
      {{SUBTITLE}}
    </text>
  </g>

  <!-- 右上角 Logo 区域占位 -->
  <g id="cover-logo">
    <rect x="1080" y="25" width="160" height="50" fill="none" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.3" rx="4"/>
    <text x="1160" y="58" text-anchor="middle" fill="#FFFFFF" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" id="semantic-01_cover-logo-1" data-pptx-role="logo">
      {{LOGO}}
    </text>
  </g>

  <!-- 装饰分割线 -->
  <g id="cover-divider">
    <line x1="420" y1="450" x2="860" y2="450" stroke="#0066CC" stroke-width="2"/>
    <circle cx="640" cy="450" r="5" fill="#0066CC"/>
  </g>

  <!-- ==================== 答辩人信息区域 ==================== -->
  <g id="cover-presenter">
    <text x="640" y="520" text-anchor="middle" fill="#333333" font-family="Microsoft YaHei, Arial, sans-serif" font-size="24">
      答辩人：{{AUTHOR}}
    </text>
    <text x="640" y="560" text-anchor="middle" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20">
      指导老师：{{ADVISOR}}
    </text>
    <text x="640" y="600" text-anchor="middle" fill="#666666" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18">
      {{INSTITUTION}}
    </text>
  </g>

  <!-- ==================== 底部信息 ==================== -->
  <g id="cover-date">
    <text x="640" y="698" text-anchor="middle" fill="#999999" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">
      {{DATE}}
    </text>
  </g>
</svg>
